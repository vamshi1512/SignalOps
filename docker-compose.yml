name: roboyard-control

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roboyard_control
      POSTGRES_USER: roboyard
      POSTGRES_PASSWORD: roboyard
    ports:
      - "5432:5432"
    volumes:
      - roboyard-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roboyard -d roboyard_control"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      ROBOYARD_DATABASE_URL: postgresql+asyncpg://roboyard:roboyard@db:5432/roboyard_control
      ROBOYARD_REDIS_URL: redis://redis:6379/0
      ROBOYARD_CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      ROBOYARD_SEED_ON_START: "true"
      ROBOYARD_DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    environment:
      ROBOYARD_DATABASE_URL: postgresql+asyncpg://roboyard:roboyard@db:5432/roboyard_control
      ROBOYARD_REDIS_URL: redis://redis:6379/0
      ROBOYARD_SEED_ON_START: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

  beat:
    build:
      context: ./backend
    environment:
      ROBOYARD_DATABASE_URL: postgresql+asyncpg://roboyard:roboyard@db:5432/roboyard_control
      ROBOYARD_REDIS_URL: redis://redis:6379/0
      ROBOYARD_SEED_ON_START: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  roboyard-db:
