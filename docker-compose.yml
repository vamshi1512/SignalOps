name: testforge

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: testforge
      POSTGRES_USER: testforge
      POSTGRES_PASSWORD: testforge
    ports:
      - "5432:5432"
    volumes:
      - testforge-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testforge -d testforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      TESTFORGE_DATABASE_URL: postgresql+asyncpg://testforge:testforge@db:5432/testforge
      TESTFORGE_REDIS_URL: redis://redis:6379/0
      TESTFORGE_CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      TESTFORGE_SEED_ON_START: "true"
      TESTFORGE_DEMO_MODE: "true"
      TESTFORGE_CELERY_EAGER: "false"
      TESTFORGE_ARTIFACT_ROOT: /app/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - testforge-artifacts:/app/artifacts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/ready', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      TESTFORGE_DATABASE_URL: postgresql+asyncpg://testforge:testforge@db:5432/testforge
      TESTFORGE_REDIS_URL: redis://redis:6379/0
      TESTFORGE_SEED_ON_START: "false"
      TESTFORGE_CELERY_EAGER: "false"
      TESTFORGE_ARTIFACT_ROOT: /app/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - testforge-artifacts:/app/artifacts
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      TESTFORGE_DATABASE_URL: postgresql+asyncpg://testforge:testforge@db:5432/testforge
      TESTFORGE_REDIS_URL: redis://redis:6379/0
      TESTFORGE_SEED_ON_START: "false"
      TESTFORGE_CELERY_EAGER: "false"
      TESTFORGE_ARTIFACT_ROOT: /app/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - testforge-artifacts:/app/artifacts
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  testforge-db:
  testforge-artifacts:
